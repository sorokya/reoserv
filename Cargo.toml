[package]
name = "reoserv"
version = "0.1.0"
authors = ["Richard Leek <richard@richardleek.com>"]
edition = "2018"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
config = { version = "0.10", features = ["toml"] }
chrono = "0.4"
diesel = { version = "1.4.4", features = ["mysql", "chrono"] }
dotenv = "0.15.0"
eo = { git = "https://github.com/sorokya/eo" }
log = "0.4"
num-traits = "0.2"
pretty_env_logger = "0.3"
rand = "0.7"
regex = "1"
serde_derive = "^1.0.8"
serde = "^1.0.8"
