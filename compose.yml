name: reoserv
services:
  reoserv:
    build: .
    ports:
      - "8078:8078"
      - "8079:8079"
    volumes:
      - ./config:/reoserv/config
      - ./data:/reoserv/data
    depends_on:
      - db

  db:
    image: mariadb:12.2
    environment:
      MYSQL_ROOT_PASSWORD: reoserv
      MYSQL_DATABASE: reoserv
      MYSQL_USER: reoserv
      MYSQL_PASSWORD: reoserv
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

networks:
  default:
    driver: bridge

volumes:
  db_data:
